server:
  port: 8080

spring:
  application:
    name: course-selection-system

  datasource:
    url: jdbc:postgresql://localhost:5432/course_selection
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: course-selection-system-jwt-secret-key-2024
  expiration: 86400000  # 24 hours

course-selection:
  open-duration-minutes: 30
  default-capacity: 90
  min-enrollment: 30
  courses:
    - id: 1
      name: "高等数学"
    - id: 2
      name: "线性代数"
    - id: 3
      name: "概率论与数理统计"
    - id: 4
      name: "大学物理"
    - id: 5
      name: "数据结构与算法"
    - id: 6
      name: "操作系统"
    - id: 7
      name: "计算机网络"
    - id: 8
      name: "数据库原理"
    - id: 9
      name: "软件工程"
